<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Sun rays -->
  <g stroke="#f59e0b" stroke-width="2" stroke-linecap="round">
    <line x1="16" y1="2"  x2="16" y2="5"/>
    <line x1="16" y1="27" x2="16" y2="30"/>
    <line x1="2"  y1="16" x2="5"  y2="16"/>
    <line x1="27" y1="16" x2="30" y2="16"/>
    <line x1="5.5"  y1="5.5"  x2="7.6"  y2="7.6"/>
    <line x1="24.4" y1="24.4" x2="26.5" y2="26.5"/>
    <line x1="26.5" y1="5.5"  x2="24.4" y2="7.6"/>
    <line x1="7.6"  y1="24.4" x2="5.5"  y2="26.5"/>
  </g>
  <!-- Sun circle -->
  <circle cx="16" cy="16" r="7" fill="#f59e0b"/>
  <!-- Solar panel grid overlay -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#7e5700" stroke-width="0.8"/>
  <line x1="9" y1="16" x2="23" y2="16" stroke="#7e5700" stroke-width="0.8"/>
  <line x1="16" y1="9"  x2="16" y2="23" stroke="#7e5700" stroke-width="0.8"/>
</svg>
